name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Zip dist
        run: zip -r dist.zip dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
