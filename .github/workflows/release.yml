name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Get plugin name
        id: plugin
        run: echo "name=$(jq -r '.name | gsub(" "; "-")' manifest.json)" >> $GITHUB_OUTPUT

      - name: Zip dist
        run: zip -r "${{ steps.plugin.outputs.name }}.zip" dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ steps.plugin.outputs.name }}.zip"
